<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
   
</head>
<body>
    <div class="container">
        <h1>Currency Converter</h1>
        <div class="enter-amount">
            <p>Enter Amount</p>
            <input type="text" value="100" id="amount-entered">
            <p class="error-message"></p>
        </div>
        <div class="select-currency">
            <div class="from">
                <p>From</p>
                <img src="https://flagsapi.com/US/flat/64.png" id="from-country-img">
                <select name="from" id="from-selector">
                    <option value="USD">USD</option>
                    <option value="INR">INR</option>
                </select>
            </div>
            <i class="fa-solid fa-right-left"></i>
            <div class="to">
                <p>To</p>
                <img src="https://flagsapi.com/US/flat/64.png" id="to-country-img">
                 <select name="to" id="to-selector">
                   <option value="USD">USD</option>
                    <option value="INR">INR</option>
                </select>
            </div>
        </div>
        <button class="get-exchange">Get Exchange Rate</button>
        <div class="final-message">1USD => 1USD</div>
    </div>
    
</body>
 <script src="./script.js" defer></script>
</html>
